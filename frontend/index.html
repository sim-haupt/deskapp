<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pixel Desk is a retro market board with weather, live clocks, a market ticker loop, and sector performance."
    />
    <title>Pixel Desk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="desktop-frame" aria-labelledby="app-title">
        <h1 id="app-title" class="sr-only">Pixel Desk</h1>

        <header class="top-status">
          <div class="status-row status-row-main">
            <div class="status-date">
              <p id="current-date" class="status-large">Loading...</p>
            </div>

            <div class="status-weather">
              <img
                id="weather-icon"
                class="weather-icon weather-icon-bar"
                src="./assets/weather/weather-sunny.svg"
                alt="Current weather icon"
                width="52"
                height="52"
              />
              <p class="status-large">
                <span id="weather-temp-inline">--°C</span>
                <span class="divider">|</span>
                <span id="weather-status-inline">SYNCING</span>
                <span class="divider">|</span>
                <span id="weather-city-label">LANGEN</span>
              </p>
            </div>

            <div class="city-switcher city-switcher-top" role="group" aria-label="Choose city">
              <button
                class="city-button is-active"
                data-city="langen"
                aria-pressed="true"
                type="button"
              >
                Langen
              </button>
              <button
                class="city-button"
                data-city="heidelberg"
                aria-pressed="false"
                type="button"
              >
                Heidelberg
              </button>
            </div>
          </div>

          <div class="status-row status-row-sub">
            <div class="time-strip">
              <p id="time-cet" class="status-clock">--:--:--</p>
              <span class="live-pill">CET</span>
              <p id="time-ny" class="status-clock secondary">--:--:--</p>
              <span class="live-pill alt">NY</span>
            </div>

            <div class="session-strip" aria-live="polite">
              <p id="header-session-phase" class="session-phase">Checking session</p>
              <p id="header-session-countdown" class="session-countdown">Next phase in --:--</p>
            </div>

          </div>
        </header>

        <section class="ticker-strip" aria-labelledby="ticker-title" aria-live="polite">
          <h2 id="ticker-title" class="sr-only">Market ticker</h2>
          <div class="ticker-window" aria-label="Scrolling market ticker">
            <div id="ticker-marquee" class="ticker-marquee">
              <div id="ticker-track-a" class="ticker-track"></div>
              <div id="ticker-track-b" class="ticker-track" aria-hidden="true"></div>
            </div>
          </div>
        </section>

        <section class="main-content" aria-label="Main content">
          <article class="widget widget-primary" aria-labelledby="sector-title">
            <div class="widget-title-row">
              <h2 id="sector-title" class="widget-title">SECTOR PERFORMANCE</h2>
            </div>
            <div class="widget-body">
              <ul id="sector-list" class="metric-list" aria-live="polite">
                <li class="metric-row">
                  <span>Loading</span>
                  <strong class="neutral">--</strong>
                </li>
              </ul>
            </div>
          </article>
        </section>

        <footer class="footer-strip">
          <p id="data-status" class="footer-item" role="status">Connecting to backend…</p>
          <p id="feed-label" class="footer-item">Delayed SIP equities</p>
          <p id="last-updated" class="footer-item">Awaiting first sync</p>

          <div class="theme-switcher" role="group" aria-label="Choose theme">
            <button
              class="theme-button is-active"
              data-theme="arcade"
              aria-pressed="true"
              type="button"
            >
              Arcade
            </button>
            <button class="theme-button" data-theme="dark" aria-pressed="false" type="button">
              Dark
            </button>
            <button class="theme-button" data-theme="sunset" aria-pressed="false" type="button">
              Sunset
            </button>
            <button class="theme-button" data-theme="mint" aria-pressed="false" type="button">
              Mint
            </button>
            <button class="theme-button" data-theme="light" aria-pressed="false" type="button">
              Light
            </button>
          </div>
        </footer>
      </section>
    </main>

    <script src="./app-config.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
